name: TestSprite CI

on:
  push:
    branches: [main]

jobs:
  testsprite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TestSprite CLI
        run: npm i -g @testsprite/testsprite-cli

      - name: Run TestSprite Tests
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        run: |
          testsprite test run 210caabd-a2ed-4ffe-9ae3-70b56b1e1f25 \
            --target-url https://ai-pr-reviewer-snowy.vercel.app \
            --wait --output json || true
