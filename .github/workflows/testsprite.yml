name: TestSprite CI

on:
  push:
    branches: [main]

jobs:
  testsprite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TestSprite CLI
        run: npm i -g @testsprite/testsprite-cli

      - name: Run TestSprite Tests
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        run: |
          testsprite test run --all \
            --project f9d9e262-e566-4933-9e27-fef1577eac6c \
            --target-url https://ai-pr-reviewer-snowy.vercel.app \
            --wait --output json
